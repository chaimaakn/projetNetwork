# =============================================================================
# FW_CLIENT - Squid : proxy + filtrage web
# Équivalent : FortiGate > Security Profiles > Web Filter
# =============================================================================

http_port 3128

# --- ACL : qui peut utiliser le proxy ---
acl lan_client src 192.168.10.0/24
acl localnet src 127.0.0.0/8

# --- Catégories bloquées (équivalent URL Categories FortiGate) ---
# Listes simples - peuvent être enrichies depuis ufdbGuard / SquidGuard / e2guardian

# Domaines explicitement bloqués
acl blocked_domains dstdomain "/etc/squid/blocked_domains.txt"

# Mots-clés interdits dans l'URL
acl blocked_keywords url_regex -i malware phishing torrent piratage warez

# Catégories habituelles à bloquer en entreprise
acl bad_extensions urlpath_regex -i \.(exe|bat|cmd|scr|pif|com)$

# --- Règles d'accès ---
http_access deny  blocked_domains
http_access deny  blocked_keywords
http_access deny  bad_extensions
http_access allow lan_client
http_access allow localnet
http_access deny  all

# --- Logging (pour la phase 2 : journalisation des accès web) ---
access_log /var/log/squid/access.log squid
cache_log  /var/log/squid/cache.log

# --- Cache désactivé pour simplifier en lab ---
cache deny all

# Identification du proxy dans les en-têtes
visible_hostname fw-client-proxy