# =============================================================================
# FW_CLIENT - Configuration IPsec strongSwan
# Équivalent : FortiGate > VPN > IPsec Tunnels
# =============================================================================
# Tunnel IKEv2 entre FW_CLIENT (10.10.0.2) et FW_SERVER (10.20.0.2)
# Subnets protégés : LAN_CLIENT (192.168.10.0/24) <-> LAN_SERVER (192.168.20.0/24)
# =============================================================================

config setup
    charondebug="ike 2, knl 2, cfg 2"
    uniqueids=yes

# Connexion principale du tunnel
conn site-to-site
    # --- Phase 1 (IKE_SA) ---
    keyexchange=ikev2
    ike=aes256-sha256-modp2048!         # AES-256, SHA-256, DH groupe 14
    ikelifetime=8h

    # --- Phase 2 (CHILD_SA / ESP) ---
    esp=aes256-sha256-modp2048!         # PFS activé via modp2048
    lifetime=1h

    # --- Endpoints ---
    left=10.10.0.2                       # IP locale (côté FW_CLIENT)
    leftsubnet=192.168.10.0/24           # Réseau local protégé
    leftid=@fw-client.labcyber.local

    right=10.20.0.2                      # IP distante (FW_SERVER)
    rightsubnet=192.168.20.0/24          # Réseau distant
    rightid=@fw-server.labcyber.local

    # --- Authentification : PSK pour le lab (à remplacer par certificats en prod) ---
    authby=secret

    # --- Politique de connexion ---
    auto=start                           # Établir au démarrage
    dpdaction=restart                    # Restart si Dead Peer Detection
    dpddelay=30s
    dpdtimeout=120s
    closeaction=restart