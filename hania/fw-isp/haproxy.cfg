# =============================================================================
# FW_ISP - HAProxy : Load balancer applicatif HTTP
# Équivalent : pfSense > Services > HAProxy package
# =============================================================================
# Distribue les requêtes HTTP entrantes vers les serveurs web du LAN_SERVER

global
    log         /dev/log local0
    maxconn     2000
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

# --- Frontend : écoute publique sur le port 80 du FW_ISP (côté Internet) ---
frontend http_in
    bind 200.0.0.10:80
    default_backend  webservers

# --- Backend : pool de serveurs web ---
# Note : pour atteindre le LAN_SERVER, le routage IP doit être actif
# (sera testé en Phase 1)
backend webservers
    balance roundrobin
    option httpchk GET /
    server web1 192.168.20.10:80 check inter 2000ms
    # server web2 192.168.20.12:80 check  # à ajouter pour HA en Phase 2

# --- Stats HAProxy (accessibles depuis mgmt_net uniquement) ---
listen stats
    bind 192.168.99.1:8404
    stats enable
    stats uri /
    stats refresh 10s
    stats admin if TRUE