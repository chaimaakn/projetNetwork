# =============================================================================
# FW_ISP - Configuration dnsmasq (DNS Resolver + DHCP)
# Équivalent : pfSense > Services > DNS Resolver + DHCP Server
# =============================================================================

# --- DNS Resolver ---
# Le firewall répond aux requêtes DNS et les forwarde vers des résolveurs publics
port=53
domain-needed              # N'envoie pas les requêtes sans domaine
bogus-priv                 # Ne forwarde pas les RFC1918 reverse
no-resolv                  # N'utilise pas /etc/resolv.conf
no-poll

# Forwarders externes (équivalent General Setup > DNS Servers sur pfSense)
server=8.8.8.8
server=1.1.1.1
server=9.9.9.9

# Cache DNS (performance)
cache-size=1000
neg-ttl=60

# Domaine local du lab
domain=labcyber.local
local=/labcyber.local/

# Entrées DNS internes statiques (équivalent Host Overrides)
address=/fw-isp.labcyber.local/192.168.99.1
address=/fw-client.labcyber.local/192.168.99.10
address=/fw-server.labcyber.local/192.168.99.20
address=/web.labcyber.local/192.168.20.10
address=/ssh.labcyber.local/192.168.20.11

# Logging (utile pour la phase 1 : analyse DNS)
log-queries
log-facility=/var/log/fw/dnsmasq.log

# --- Interfaces d'écoute ---
# On écoute sur toutes les interfaces SAUF eth0 (Internet)
interface=eth1            # wan_client_net
interface=eth2            # wan_server_net
interface=eth3            # mgmt_net
bind-interfaces

# Note : DHCP est géré par les FortiGate-like (FW_CLIENT et FW_SERVER)
# Pas de dhcp-range ici - voir docs pfSense pour activer si besoin